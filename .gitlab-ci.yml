build_image:
  stage: build
  image: quay.io/buildah/stable:latest
  variables:
    REGISTRY_URL: "oci.vvtechsolutions.eu"
    IMAGE_NAME: "kube-lens"
    BUILDAH_ISOLATION: chroot
    STORAGE_DRIVER: vfs
  before_script:
    - echo "$REGISTRY_PASSWORD" | buildah login -u "$REGISTRY_USER" --password-stdin "$REGISTRY_URL"
  script:
    - |
      buildah build \
        --format docker \
        --platform linux/arm64 \
        --tag "$REGISTRY_URL/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" \
        --tag "$REGISTRY_URL/$IMAGE_NAME:latest" \
        --cache-from "$REGISTRY_URL/$IMAGE_NAME" \
        .
    - buildah push "$REGISTRY_URL/$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
    - buildah push "$REGISTRY_URL/$IMAGE_NAME:latest"
  only:
    - main