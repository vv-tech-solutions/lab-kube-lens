services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_URL: "https://ollama.tailc12aaa.ts.net/api"
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "6333"
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_storage
    ports:
      - "6333:6333" # API HTTP
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage:z
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: always

volumes:
  qdrant_data: